services:

  postgres:
    image: postgres:16
    container_name: livebeat-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: livebeat
      POSTGRES_USER: ${POSTGRES_USER:-livebeat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-livebeat_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-livebeat} -d livebeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - livebeat-net

  redis:
    image: redis:7-alpine
    container_name: livebeat-redis
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-livebeat_dev}
    command: redis-server --requirepass ${REDIS_PASSWORD:-livebeat_dev}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - livebeat-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: livebeat-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-livebeat}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-livebeat_dev}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - livebeat-net

  minio:
    image: minio/minio
    container_name: livebeat-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-livebeat}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-livebeat_dev_secret}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - livebeat-net

  mailpit:
    image: axllent/mailpit
    container_name: livebeat-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - livebeat-net

  jaeger:
    image: jaegertracing/all-in-one
    container_name: livebeat-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - livebeat-net

  nginx:
    image: nginx:alpine
    container_name: livebeat-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - livebeat-net

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:

networks:
  livebeat-net:
    driver: bridge
