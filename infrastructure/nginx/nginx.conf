events {
    worker_connections 1024;
}

http {
    # 本機開發：後端與前端直接在 host 上跑，透過 host.docker.internal 存取
    # macOS / Windows Docker Desktop 原生支援此 hostname
    # Linux 需在 docker-compose nginx service 加 extra_hosts: host-gateway

    upstream backend {
        server host.docker.internal:8080;
    }

    upstream user-web {
        server host.docker.internal:5173;
    }

    upstream admin-web {
        server host.docker.internal:5174;
    }

    server {
        listen 80;
        server_name localhost;

        # API
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket（STOMP）
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Swagger UI
        location /swagger-ui/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        location /v3/api-docs {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # 後台管理 Web（/admin 開頭）
        location /admin/ {
            proxy_pass http://admin-web/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # 使用者前台 Web
        location / {
            proxy_pass http://user-web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
